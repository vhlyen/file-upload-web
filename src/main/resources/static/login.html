<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <title>Admin Login - Document Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Sign in to manage Document Hub resources.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" placeholder="Enter password" required>
                    <button type="button" class="password-toggle" id="passwordToggle" aria-controls="password" aria-pressed="false">Show</button>
                </div>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="error-message" id="errorMessage"></div>
        </form>

        <div class="back-link">
            <a href="index.html">Back to Document Hub</a>
        </div>
    </div>

    <script>
        document.getElementById('passwordToggle').addEventListener('click', () => {
            const password = document.getElementById('password');
            const toggle = document.getElementById('passwordToggle');
            const shouldShow = password.type === 'password';

            password.type = shouldShow ? 'text' : 'password';
            toggle.textContent = shouldShow ? 'Hide' : 'Show';
            toggle.setAttribute('aria-pressed', String(shouldShow));
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('isAdmin', 'true');
                    localStorage.setItem('adminName', result.adminName);
                    window.location.href = 'index.html';
                } else {
                    errorMessage.textContent = result.message || 'Invalid credentials';
                    errorMessage.classList.add('show');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = 'Login failed. Please try again.';
                errorMessage.classList.add('show');
            }
        });
    </script>
</body>
</html>
